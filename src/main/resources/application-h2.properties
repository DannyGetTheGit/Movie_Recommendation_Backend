# H2 in-memory database — active when running with: -Dspring-boot.run.profiles=h2
# Data resets on every restart (fine for local testing)

spring.datasource.url=jdbc:h2:mem:moviedb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Browse tables at http://localhost:8080/h2-console while the app is running
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
