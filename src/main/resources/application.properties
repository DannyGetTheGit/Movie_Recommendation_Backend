spring.application.name=movierecommender

# Active profile — "h2" uses an in-memory database so no PostgreSQL installation is needed.
# When you're ready to use a real database, comment this line out and start PostgreSQL.
spring.profiles.active=h2

# PostgreSQL settings (used when the h2 profile is NOT active)
spring.datasource.url=jdbc:postgresql://localhost:5432/moviedb
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Dialect removed — Hibernate auto-detects it from the JDBC driver (avoids the HHH90000025 warning)

# JWT
jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.expiration=86400000

# TMDB API
tmdb.api.key=your_tmdb_api_key_here
tmdb.api.base-url=https://api.themoviedb.org/3
