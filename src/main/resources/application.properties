spring.application.name=movierecommender

# ─── DATABASE ────────────────────────────────────────────────────────────────
# PostgreSQL — make sure the database exists before starting:
#   CREATE DATABASE moviedb;
# Hibernate creates and updates tables automatically (ddl-auto=update).
spring.datasource.url=jdbc:postgresql://localhost:5432/moviedb
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── LOCAL TESTING WITHOUT POSTGRESQL ────────────────────────────────────────
# Uncomment the line below to run with an H2 in-memory database instead.
# H2 requires no installation — data resets on every restart.
# spring.profiles.active=h2

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Replace this secret with a secure random value before deploying anywhere.
jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.expiration=86400000

# ─── TMDB API ─────────────────────────────────────────────────────────────────
# Get a free API key at https://www.themoviedb.org/settings/api
tmdb.api.key=your_tmdb_api_key_here
tmdb.api.base-url=https://api.themoviedb.org/3
